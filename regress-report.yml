bugreports:
  - summary: |
      При фильтрации товаров удаляется кнопка "Следующая"
    environment: |
      Yandex 25.12.4.1216 (64 бит)
      Windows 11, version 25H2
    steps-to-reproduce: |
      1. Открыть страницу с товарами
      2. Отфильтровать товар
    expected-result: |
      При фильтрации товара не должно ничего удаляться
    actual-result: |
      При фильтрации товаров удаляется кнопка "Следующая"

  - summary: |
      При выборе пустой категории по остальным фильтрам ничего не выполняется (не фильтруется)
    environment: |
      Yandex 25.12.4.1216 (64 бит)
      Windows 11, version 25H2
    steps-to-reproduce: |
      1. Открыть страницу с товарами
      2. Выбрать пустую категорию
    expected-result: |
      При выборе пустой категории, категории должна сброситься
      Остальные параметры должны фильтроваться без ошибок
    actual-result: |
      При выборе пустой категории, категория должна сброситься. 
      Но остальные параметры фильтров не работают, не фильтруют

  - summary: |
      При переходе на навигацию "Магазин" из страницы "Корзина" удаленный товар возвращается
    environment: |
      Yandex 25.12.4.1216 (64 бит)
      Windows 11, version 25H2
    steps-to-reproduce: |
      1. Открыть корзину
      2. Выбрать в навигации "Магазин"
    expected-result: |
      При переходе на навигацию "Магазин" из страницы "Корзина" должна открыться страница с товарами
      До этого было удаление всей корзины. Никакого товара в корзине не должно быть 
    actual-result: |
      При переходе на навигацию "Магазин" из страницы "Корзина" кол-во товаров в корзине возвращает свое значение. 
      До этого было удаление всей корзины
