---
- summary: |
    Не отображается картинка в пункте меню "Язык" в выпадающем списке у языка "English"
  environment: |
    Yandex 25.12.4.1216 (64 бит)
    Windows 11, version 25H2
  steps-to-reproduce: |
    1. Выбрать пункт меню "Язык"
  expected-result: |
    Должна отображаться картинка у языка "English"
  actual-result: |
    Не отображаться картинка у языка "English"

- summary: |
    При выборе русского языка не весь сайт переводится
  environment: |
    Microsoft Edqe 145.0.3800.70 (64 бит)
    Windows 11, version 25H2
  steps-to-reproduce: |
    1. Выбрать пункт меню "Язык"
    2. В выпадающем списке выбрать русский язык
  expected-result: |
    Весь текст на сайте должен перевестись на русский язык
  actual-result: |
    Не весь текст на сайте переводится

- summary: |
    В фильтре "Производитель" пункт с пустым значением дублирует фильтр "Категории" со значением - "Продукты"
  environment: |
    Yandex 25.12.4.1216 (64 бит)
    Windows 11, version 25H2
  steps-to-reproduce: |
    1. Открыть первую страницу (products?skip=0) с товарами
    2. Выбрать в фильтре "Производитель" пустое значение
    3. Посмотреть результат
  expected-result: |
    В фильтре "Производитель" не должно отображается пустых значений
  actual-result: |
    В фильтре "Производитель" отображается пункт с пустым значением
    Данный пункт дублирует фильтр категории" со значением - "Продукты"

- summary: |
    В фильтре "Производитель" пункт с пустым значением ничего не выполняет (не фильтрует)
  environment: |
    Yandex 25.12.4.1216 (64 бит)
    Windows 11, version 25H2
  steps-to-reproduce: |
    1. Открыть вторую страницу (products?skip=30) с товарами
    2. Выбрать в фильтре "Производитель" пустое значение
    3. Посмотреть результат
  expected-result: |
    Фильтр "Производитель" должен быть пустым
  actual-result: |
    В фильтре "Производитель" отображается пункт с пустым значением
    Данный пункт ничего не выполняет

- summary: |
    Если ширина сайта от 1200px до 1400px у товаром съезжает цена, количество и кнопка за рамки блока
  environment: |
    Yandex 25.12.4.1216 (64 бит)
    Windows 11, version 25H2
  steps-to-reproduce: |
    1. Открыть страницу с товарами
    2. Открыть Devtools
    3. Включить адаптивный режим
    4. Изменить ширину сайта с 1200-1400px
  expected-result: |
    Информация по товару не должна съезжать за рамки самого блока
  actual-result: |
    Информация по товару (цена, количество и кнопка) съезжают за рамки самого блока

- summary: |
    Если ширина сайта меньше 992px, то блок с "Поиском" больше контейнера 
  environment: |
    Microsoft Edqe 145.0.3800.70 (64 бит)
    Windows 11, version 25H2
  steps-to-reproduce: |
    1. Открыть страницу с товарами
    2. Открыть Devtools
    3. Включить адаптивный режим
    4. Изменить ширину сайта с 1200-1400px
  expected-result: |
    Информация по товару не должна съезжать за рамки самого блока
  actual-result: |
    Информация по товару (цена, количество и кнопка) съезжают за рамки самого блока

- summary: |
    При оформлении заказа в Devtools отображается ошибка 500 (Ошибка сервера)
  environment: |
    Microsoft Edqe 145.0.3800.70 (64 бит)
    Windows 11, version 25H2
  steps-to-reproduce: |
    1. На странице магазина добавить товар в корзину
    2. Открыть корзину
    3. Открыть Devtools
    4. Нажать кнопку "Оформить заказ"
    5. Во вкладке Network найти имя "failed"
    6. Увидеть статус 500
  expected-result: |
    При оформлении заказа в Devtools не должно быть ошибок
  actual-result: |
    При оформлении заказа в Devtools выводится ошибка 500 (Ошибка сервера)

- summary: |
    Не закрывается модальное окно при нажатии на крестик, когда оформляется заказ
  environment: |
    Yandex 25.12.4.1216 (64 бит)
    Windows 11, version 25H2
  steps-to-reproduce: |
    1. На странице магазина добавить товар в корзину
    2. Открыть корзину
    3. Нажать кнопку "Оформить заказ" (откроется модальное окно с успешным оформлением заказа)
    4. В модальном окне нажать на крестик
  expected-result: |
    При нажатии на крести (закрытие) модальное окно должно закрыться
  actual-result: |
    При нажатии на крести (закрытие) модальное окно должно не закрывается
