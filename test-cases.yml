  expected-result: |
    Пользователь должен увидеть успешное удаление всего товара из корзины

- summary: |
    Успешная проверка товара в поле "Поиск"
  requirement: |
    При вводе значение в поле "Поиск" товар должен отфильтроваться и показать доступные товары
  prerequisites: |
    Должна быть открыта страница с товарами
  test-data: |
    Поиск = Food
  steps:
    - Выбираем поле "Поиск"
    - Пишем значение
  expected-result: |
    Пользователь должен увидеть отфильтрованные товары по наименованию

- summary: |
    Смена языка интерфейса на Русский язык
  requirement: |
    При выборе в пункте меню "Язык" - "Русский" интерфейс должен перевестись на выбранный язык (во всех разделах)
  prerequisites: |
    Должна быть открыта страница с товарами
  test-data: |
    Язык = Русский
  steps:
    - Нажимаем в пункте меню "Язык"
    - В списке выбираем Русский язык
    - Просмотриваем каталог
    - Выставлям фильтр товаров
    - Открываем товар
    - Добавляем товар в корзину
    - Переходим в корзину
    - Оформляем заказ
  expected-result: |
    Пользователь должен увидеть смену языка интерфейса на всем сайте (во всех разделах)
    
