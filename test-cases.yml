- summary: |
    Успешная проверка адаптивного сайта на мобильный устройствах 
  requirement: |
    При нажатии на адаптивный режим в инструменте разработчика DevTools сайт должен быть оптимизированный под разные устройства, чтобы контент отображался корректно, сохраняя удобство навигации и читабельность
  prerequisites: |
    Должен быть открыт инструмент разработчика DevTools
  test-data: |
    Ширина = 375px
    Высота = 667px
  steps:
    - Открываем инструмент разработчика DevTools
    - Выбираем режим адаптивной верстки
    - Указываем значения ширины и высоты как на мобильный устройствах 
  expected-result: |
    Пользователь должнен увидеть успешную проверку адаптивного сайта на мобильный устройствах

